apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/hacbs-release-tests/e2e-base?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/max-keep-runs: "3"
    pipelinesascode.tekton.dev/on-cel-expression: event == "push" && target_branch == "konflux-ls-v4-17-credential-operator-14"
  creationTimestamp: null
  labels:
    appstudio.openshift.io/application: large-snapshot-build-v4-17
    appstudio.openshift.io/component: v4-17-credential-operator-14
    pipelines.appstudio.openshift.io/type: build
  name: v4-17-credential-operator-14-on-push
  namespace: dev-release-team-tenant
spec:
  params:
  - name: dockerfile
    value: Dockerfile
  - name: git-url
    value: '{{repo_url}}'
  - name: image-expires-after
    value: 5d
  - name: output-image
    value: quay.io/redhat-user-workloads-stage/dev-release-team-tenant/v4-17-credential-operator-14:{{revision}}
  - name: revision
    value: '{{revision}}'
  pipelineRef:
    name: docker-build-oci-ta
    bundle: latest
  workspaces:
  - name: git-auth
    secret:
      secretName: '{{ git_auth_secret }}'
  - name: workspace
    volumeClaimTemplate:
      metadata:
        creationTimestamp: null
      spec:
        accessModes:
        - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
      status: {}
status: {}
