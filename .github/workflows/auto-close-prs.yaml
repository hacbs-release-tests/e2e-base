name: Auto-close PRs to large-snapshot branches
on:
  pull_request:
    types: [opened, reopened]

jobs:
  auto-close:
    runs-on: ubuntu-latest
    if: startsWith(github.base_ref, 'large-snapshot-')
    steps:
      - name: Close PR
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              state: 'closed'
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '🚫 This PR was automatically closed. The `large-snapshot-*` branches are test branches that do not accept pull requests. Only push events trigger builds for these branches.'
            });
